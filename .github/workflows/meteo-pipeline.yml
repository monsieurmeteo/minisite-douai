name: Pipeline Modeles Meteo

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'ecmwf | icon-eu | all'
        required: false
        default: 'all'
  schedule:
    - cron: '30 7 * * *'
    - cron: '30 19 * * *'
    - cron: '15 3,6,9,12,15,18,21 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libeccodes-dev libeccodes-tools

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r scripts/meteo/requirements.txt

      - name: Run pipeline
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_pipeline.py ${{ github.event.inputs.model || 'all' }}
        continue-on-error: true

      - name: Cleanup old files
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python cleanup_supabase.py
