name: Pipeline Modeles Meteo

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'arome | ecmwf | icon-eu | all'
        required: false
        default: 'arome'
  schedule:
    - cron: '30 1,4,7,10,13,16,19,22 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libeccodes-dev libeccodes-tools

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r scripts/meteo/requirements.txt

      - name: Run AROME pipeline
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MF_API_TOKEN: ${{ secrets.MF_API_TOKEN }}
        run: python run_pipeline.py arome
        continue-on-error: true

      - name: Run ECMWF pipeline
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ECMWF_API_KEY: ${{ secrets.ECMWF_API_KEY }}
          ECMWF_API_EMAIL: ${{ secrets.ECMWF_API_EMAIL }}
        run: python run_pipeline.py ecmwf
        continue-on-error: true

      - name: Run ICON-EU pipeline
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_pipeline.py icon-eu
        continue-on-error: true

      - name: Cleanup old files
        working-directory: scripts/meteo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python cleanup_supabase.py

      - name: Done
        run: echo "Pipeline done - $(date -u '+%Y-%m-%d %H:%M UTC')"
