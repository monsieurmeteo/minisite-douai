name: Archivage Historique des Observations

on:
  schedule:
    # A 02h30 du matin tous les jours
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  archive_data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install @supabase/supabase-js dotenv

    - name: Run Archive Script
      env:
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: node scripts/cron_archive_history.mjs
