name: Backfill Quotidien des Données 6mn

on:
  schedule:
    # A 02h00 du matin tous les jours (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

jobs:
  backfill_data:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # La boucle complète peut prendre environ 3-4 minutes
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install @supabase/supabase-js dotenv

    - name: Run Backfill Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        MF_CONSUMER_KEY: ${{ secrets.MF_CONSUMER_KEY }}
        MF_CONSUMER_SECRET: ${{ secrets.MF_CONSUMER_SECRET }}
      run: node scripts/cron_backfill_6mn.mjs
