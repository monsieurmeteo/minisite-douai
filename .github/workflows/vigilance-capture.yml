name: Vigilance - Collect & Capture

on:
  schedule:
    # Toutes les 10 minutes (plus fréquent pour forcer GitHub à être réactif)
    - cron: '*/10 * * * *'
  push:
    branches: [ master ]
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  collect-and-capture:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install && npm install puppeteer

      # ── ÉTAPE 1 : Appel de l'Edge Function Supabase ──────────────────────────
      - name: 🌩️ Collect Vigilance from Météo-France API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "📡 Appel de l'Edge Function collect-vigilance..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/collect-vigilance" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "📊 HTTP Status: $HTTP_CODE"
          echo "📄 Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ L'Edge Function a retourné HTTP $HTTP_CODE - on continue quand même."
          else
            echo "✅ Données Météo-France collectées avec succès !"
          fi

      # ── PAUSE : Laisser le temps à Supabase de valider ───────────────────────
      - name: ⏳ Wait for data propagation (5s)
        run: sleep 5

      # ── ÉTAPE 2 : Capture des screenshots ────────────────────────────────────
      - name: 🖥️ Install Puppeteer dependencies
        run: sudo apt-get update && sudo apt-get install -y libgbm-dev

      - name: 📸 Run Vigilance Capture Script
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_APP_URL: https://minisite-douai.vercel.app
        run: node scripts/capture_vigilance.mjs
