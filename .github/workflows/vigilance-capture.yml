name: Vigilance Map Capture

on:
  schedule:
    # Toutes les 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  capture-vigilance:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Install Puppeteer dependencies
        run: sudo apt-get update && sudo apt-get install -y libgbm-dev
        
      - name: Run Vigilance Capture Script
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_APP_URL: https://minisite-douai.vercel.app
        run: node scripts/capture_vigilance.mjs
