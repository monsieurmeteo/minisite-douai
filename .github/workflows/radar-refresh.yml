# Radar MF Auto-Refresh - Triggered at 22:45
name: Radar MF Auto-Refresh

on:
  schedule:
    # Toutes les 5 minutes
    - cron: '*/5 * * * *'
  push:
    branches: [ master ]
  workflow_dispatch:  # Permet le déclenchement manuel

jobs:
  fetch-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install h5py numpy Pillow
      
      - name: Fetch and upload radar data
        env:
          MF_RADAR_API_KEY: ${{ secrets.MF_RADAR_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fetch_radar_supabase.py
