<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Météo France - Stations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .loading {
            background: #fff3cd;
        }

        .success {
            background: #d4edda;
        }

        .error {
            background: #f8d7da;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>

        <h1>🌡️ Test Météo France - Stations en Temps Réel</h1>

        <table id="stationsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Station</th>
                    <th>Département</th>
                    <th>Température</th>
                    <th>Vent</th>
                    <th>Humidité</th>
                    <th>Position</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

        async function loadStations() {
            const statusDiv = document.getElementById('status');
            const infoDiv = document.getElementById('info');
            const table = document.getElementById('stationsTable');
            const tbody = document.getElementById('tableBody');

            try {
                // Calculer la date du dernier cycle de 6 minutes
                const now = new Date();
                const minutes = now.getUTCMinutes();
                const roundedMinutes = Math.floor(minutes / 6) * 6;
                const cycleTime = new Date(Date.UTC(
                    now.getUTCFullYear(),
                    now.getUTCMonth(),
                    now.getUTCDate(),
                    now.getUTCHours(),
                    roundedMinutes,
                    0, 0
                ));
                cycleTime.setMinutes(cycleTime.getMinutes() - 6);

                // Format sans millisecondes : AAAA-MM-JJThh:mm:00Z
                const dateStr = cycleTime.toISOString().split('.')[0] + 'Z';

                const url = `https://public-api.meteofrance.fr/public/DPPaquetObs/v1/paquet/stations/infrahoraire-6m?date=${dateStr}&format=json`;

                console.log('Requête API:', url);

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${BEARER_TOKEN}`,
                        'Accept': 'application/json'
                    }
                });

                console.log('Status:', response.status);

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`API Error ${response.status}: ${error}`);
                }

                const stations = await response.json();
                console.log('Stations récupérées:', stations.length);

                // Afficher le succès
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `✅ ${stations.length} stations chargées avec succès !`;

                infoDiv.innerHTML = `<p><strong>Dernière mise à jour:</strong> ${cycleTime.toLocaleString('fr-FR')}</p>`;

                // Afficher le tableau
                table.style.display = 'table';

                // Remplir le tableau (limiter à 100 premières stations)
                stations.slice(0, 100).forEach(station => {
                    const row = tbody.insertRow();

                    // Station ID
                    row.insertCell(0).textContent = station.geo_id_insee || 'N/A';

                    // Département
                    const dept = station.geo_id_insee ? station.geo_id_insee.substring(0, 2) : 'N/A';
                    row.insertCell(1).textContent = dept;

                    // Température
                    const temp = station.t ? `${(station.t - 273.15).toFixed(1)}°C` : 'N/A';
                    row.insertCell(2).textContent = temp;

                    // Vent
                    const wind = station.ff ? `${(station.ff * 3.6).toFixed(1)} km/h` : 'N/A';
                    row.insertCell(3).textContent = wind;

                    // Humidité
                    const humidity = station.u !== null ? `${station.u}%` : 'N/A';
                    row.insertCell(4).textContent = humidity;

                    // Position
                    row.insertCell(5).textContent = `${station.lat.toFixed(2)}°N, ${station.lon.toFixed(2)}°E`;
                });

                if (stations.length > 100) {
                    infoDiv.innerHTML += `<p><em>Affichage des 100 premières stations sur ${stations.length}</em></p>`;
                }

            } catch (error) {
                console.error('Erreur:', error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Erreur: ${error.message}`;
            }
        }

        // Charger au démarrage
        loadStations();
    </script>
</body>

</html>
