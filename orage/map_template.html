<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Carte Foudre</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
        }

        .title-box {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-family: sans-serif;
            border: 1px solid #444;
        }

        .lightning-icon {
            font-size: 20px;
            color: #ffcc00;
            text-shadow: 0 0 5px #fffaaa;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div id="title-box" class="title-box">
        <h2 style="margin:0; font-size: 18px;">Archives Foudre</h2>
        <div id="date-display" style="font-size: 14px; margin-top: 5px; color: #aaa;">Chargement...</div>
    </div>
    <div id="map"></div>

    <script>
        // Init map immediately
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([46.603354, 1.888334], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const crossIcon = L.divIcon({
            className: 'custom-cross',
            html: '<div style="color: #FFD700; font-weight: bold; font-size: 16px;">×</div>',
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });

        // Make render function global
        window.renderMap = function () {
            const stormData = window.STORM_DATA || [];
            const mapDate = window.MAP_DATE || "Date inconnue";

            document.getElementById('date-display').textContent = mapDate;

            const myRenderer = L.canvas({ padding: 0.5 });
            let count = 0;

            // Clear existing layers if any (though we reload page usually)

            stormData.forEach(point => {
                const lat = parseFloat(point.lat);
                const lon = parseFloat(point.lon);

                if (!isNaN(lat) && !isNaN(lon)) {
                    L.circleMarker([lat, lon], {
                        renderer: myRenderer,
                        radius: 2,
                        fillColor: "#ffcc00",
                        color: "#ffcc00",
                        weight: 0,
                        fillOpacity: 0.8
                    }).addTo(map);
                    count++;
                }
            });
            console.log("Rendered " + count + " points");

            // Signal ready
            const readyDiv = document.createElement('div');
            readyDiv.id = 'ready-for-screenshot';
            document.body.appendChild(readyDiv);
        };
    </script>
</body>

</html>
